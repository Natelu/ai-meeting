apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-meeting-middleware.fullname" . }}-livekit
  labels:
    {{- include "ai-meeting-middleware.labels" . | nindent 4 }}
data:
  livekit.yaml: |
    port: 7880
    bind_addresses:
      - ""
    rtc:
      tcp_port: 7881
      udp_port: 7882
      use_external_ip: true
    keys:
      ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    logging:
      level: {{ .Values.livekit.logLevel | quote }}
    room:
      auto_create: true
    webhook:
      api_key: ${LIVEKIT_API_KEY}
      urls:
{{- range .Values.livekit.webhookUrls }}
        - {{ . | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-meeting-middleware.fullname" . }}-prometheus
  labels:
    {{- include "ai-meeting-middleware.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["127.0.0.1:9090"]
      - job_name: ai-meeting-api
        static_configs:
          - targets: ["ai-meeting-api:8080"]
      - job_name: ai-meeting-jobs
        static_configs:
          - targets: ["ai-meeting-jobs:8090"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-meeting-middleware.fullname" . }}-loki
  labels:
    {{- include "ai-meeting-middleware.labels" . | nindent 4 }}
data:
  loki-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      allow_structured_metadata: false
