{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-meeting-middleware.secretName" . }}
  labels:
    {{- include "ai-meeting-middleware.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secrets.postgres.username | quote }}
  password: {{ .Values.secrets.postgres.password | quote }}
  postgres-username: {{ .Values.secrets.postgres.username | quote }}
  postgres-password: {{ .Values.secrets.postgres.password | quote }}
  postgres-database: {{ .Values.secrets.postgres.database | quote }}
  redis-password: {{ .Values.secrets.redis.password | quote }}
  livekit-api-key: {{ .Values.secrets.livekit.apiKey | quote }}
  livekit-api-secret: {{ .Values.secrets.livekit.apiSecret | quote }}
  grafana-admin-user: {{ .Values.secrets.grafana.adminUser | quote }}
  grafana-admin-password: {{ .Values.secrets.grafana.adminPassword | quote }}
  model-s3-access-key: {{ .Values.secrets.modelS3.accessKey | quote }}
  model-s3-secret-key: {{ .Values.secrets.modelS3.secretKey | quote }}
{{- end }}
